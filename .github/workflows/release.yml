name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macOS (Apple Silicon)
            runner: macos-latest
            binary: BlueRush
            artifact: BlueRush-macos-arm
          - os: macOS (Intel)
            runner: macos-13
            binary: BlueRush
            artifact: BlueRush-macos-intel
          - os: Windows
            runner: windows-latest
            binary: BlueRush.exe
            artifact: BlueRush-windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release

      - name: Rename binary with version tag
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME}
          SRC=target/release/${{ matrix.binary }}
          EXT="${{ matrix.binary == 'BlueRush.exe' && '.exe' || '' }}"
          DST="${{ matrix.artifact }}-${VERSION}${EXT}"
          cp "$SRC" "$DST"
          echo "ASSET=$DST" >> $GITHUB_ENV

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
